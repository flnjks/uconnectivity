name: iosApp
options:
  deploymentTarget:
    iOS: "16.0"
  bundleIdPrefix: app.ucon
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosApp
    dependencies:
      - target: iosWidget
        embed: true
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: uConnectivity
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIBackgroundModes: [fetch, processing]
        BGTaskSchedulerPermittedIdentifiers: ["app.ucon.refresh"]
        # Required by Compose Multiplatform; without it PlistSanityCheck aborts.
        CADisableMinimumFrameDurationOnPhone: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ucon.iosApp
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: iosApp/iosApp.entitlements
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../composeApp/build/bin/$(KMP_TARGET)/debugFramework"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "ComposeApp"
          - "-lsqlite3"
        # Pick the right slice depending on the SDK we're building for.
        KMP_TARGET[sdk=iphoneos*]: iosArm64
        KMP_TARGET[sdk=iphonesimulator*]: iosSimulatorArm64
    preBuildScripts:
      - name: Build Kotlin framework
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          case "$PLATFORM_NAME" in
            iphonesimulator) ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 ;;
            iphoneos)        ./gradlew :composeApp:linkDebugFrameworkIosArm64 ;;
          esac
        basedOnDependencyAnalysis: false

  iosWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosWidget
    info:
      path: iosWidget/Info.plist
      properties:
        CFBundleDisplayName: uConnectivity
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ucon.iosApp.widget
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: iosWidget/iosWidget.entitlements
        SKIP_INSTALL: "YES"
